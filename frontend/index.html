<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Smart Link Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <a href="landing.html" class="logo">
            <i class="fas fa-link"></i>
            Smart Link Hub
        </a>
        <nav class="header-nav">
            <a href="index.html">Dashboard</a>
            <a href="analytics.html">Analytics</a>
            <a href="#" onclick="logout()">Logout</a>
            <button class="profile-btn">
                <i class="fas fa-user"></i>
            </button>
        </nav>
    </header>

    <div class="container">
        <div class="dashboard-header">
            <h1>Welcome, User! 👋</h1>
        </div>

        <div class="stats-overview">
            <div class="stat-card total">
                <h3>Total Links</h3>
                <div class="number" id="totalLinks">0</div>
            </div>
            <div class="stat-card clicks">
                <h3>Total Clicks</h3>
                <div class="number" id="totalClicks">0</div>
            </div>
            <div class="stat-card today">
                <h3>Clicks Today</h3>
                <div class="number" id="clicksToday">0</div>
            </div>
        </div>

        <div class="create-link-section">
            <h2>🔗 Create New Short Link</h2>
            <div id="messageBox"></div>
            <form id="createLinkForm" onsubmit="createLink(event)">
                <div class="form-row">
                    <div class="form-group">
                        <label for="longUrl">Long URL *</label>
                        <input type="url" id="longUrl" placeholder="https://example.com/very/long/url" required>
                    </div>
                    <div class="form-group">
                        <label for="customSlug">Custom Slug (Optional)</label>
                        <input type="text" id="customSlug" placeholder="my-link-slug">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="description">Description (Optional)</label>
                        <input type="text" id="description" placeholder="What is this link about?">
                    </div>
                    <div class="form-group">
                        <label for="category">Category (Optional)</label>
                        <input type="text" id="category" placeholder="e.g., marketing, social">
                    </div>
                </div>
                <div class="form-row form-row-full">
                    <div class="form-group">
                        <label for="expiryDate">Expiry Date (Optional)</label>
                        <input type="datetime-local" id="expiryDate">
                    </div>
                </div>
                <button type="submit" class="btn-create">Create Short Link</button>
            </form>
        </div>

        <div class="links-section">
            <h2>📊 Your Short Links</h2>
            <div id="linksList" class="links-list">
                <div class="empty-state">
                    <i class="fas fa-link"></i>
                    <p>No short links created yet. Start by creating one above!</p>
                </div>
            </div>
        </div>
    </div>

    <div id="qrModal" class="modal">
        <div class="modal-content">
            <h3>QR Code for Your Link</h3>
            <div class="qr-code">
                <img id="qrImage" src="" alt="QR Code">
            </div>
            <p id="modalShortLink"></p>
            <button class="close-modal" onclick="closeModal()">Close</button>
        </div>
    </div>

    <script src="dashboard.js"></script>
</body>
</html>
