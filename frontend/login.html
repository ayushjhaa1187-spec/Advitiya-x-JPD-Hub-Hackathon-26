<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Smart Link Hub</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .login-form {
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }
        .login-form h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }
        .auth-buttons {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }
        .btn-google, .btn-github {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            font-weight: 500;
            text-align: center;
        }
        .btn-google {
            background: #f5f5f5;
            color: #333;
            border: 1px solid #ddd;
        }
        .btn-github {
            background: #333;
            color: white;
        }
        .btn-google:hover {
            background: #e8e8e8;
        }
        .btn-github:hover {
            background: #222;
        }
        .auth-message {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-form">
            <h1>Smart Link Hub</h1>
            <p style="text-align: center; color: #666; margin-bottom: 30px;">Login to your account</p>
            
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="your@email.com">
            </div>
            
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Your password">
            </div>
            
            <div class="auth-buttons">
                <button class="btn-google" id="googleLoginBtn">🔵 Google</button>
                <button class="btn-github" id="githubLoginBtn">⚫ GitHub</button>
            </div>
            
            <button style="width: 100%; padding: 12px; margin-top: 20px; background: #667eea; color: white; border: none; border-radius: 4px; font-size: 16px; font-weight: 600; cursor: pointer;" id="loginBtn">Login</button>
            
            <div class="auth-message" id="authMessage"></div>
        </div>
    </div>

    <script>
        // Authentication state management
        let isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';

        // Check if user is already logged in
        if (isLoggedIn) {
            window.location.href = 'dashboard.html';
        }

        // Login functionality
        document.getElementById('loginBtn')?.addEventListener('click', function() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if (email && password) {
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('userEmail', email);
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 500);
            } else {
                document.getElementById('authMessage').textContent = 'Please fill in all fields';
            }
        });

        // Social login buttons
        document.getElementById('googleLoginBtn')?.addEventListener('click', function() {
            localStorage.setItem('isLoggedIn', 'true');
            localStorage.setItem('loginProvider', 'google');
            document.getElementById('authMessage').textContent = 'Login successful! Redirecting...';
            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 500);
        });

        document.getElementById('githubLoginBtn')?.addEventListener('click', function() {
            localStorage.setItem('isLoggedIn', 'true');
            localStorage.setItem('loginProvider', 'github');
            document.getElementById('authMessage').textContent = 'Login successful! Redirecting...';
            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 500);
        });
    </script>
</body>
</html>
