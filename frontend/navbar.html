<style>
.navbar { background: #000; border-bottom: 1px solid #222; padding: 15px 0; }
.nav-container { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; }
.nav-logo { color: #00ff41; font-weight: bold; font-size: 18px; }
.nav-menu { display: flex; list-style: none; gap: 30px; margin: 0; }
.nav-link { color: #fff; text-decoration: none; transition: 0.3s; }
.nav-link:hover { color: #00ff41; }
.nav-item.active .nav-link { color: #00ff41; border-bottom: 2px solid #00ff41; }
</style>

<script>
function initializeNavbar() {
  const currentPage = window.location.pathname.split('/').pop() || 'dashboard.html';
  document.querySelectorAll('.nav-item').forEach(item => {
    const link = item.querySelector('.nav-link');
    if (link && link.getAttribute('href') === currentPage) {
      item.classList.add('active');
    }
  });
}
initializeNavbar();
</script>
