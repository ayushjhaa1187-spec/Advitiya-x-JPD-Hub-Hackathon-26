<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Link Hub – Analysis</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <nav class="navbar">
    <div class="navbar-logo">LinkHub</div>
    <ul class="navbar-links">
      <li><a href="./dashboard.html">Dashboard</a></li>
      <li><a href="./analysis.html" class="active">Analysis</a></li>
      <li><a href="./public.html">Public Page</a></li>
    </ul>
    <div class="navbar-auth">
      <button id="btn-google-signup" class="btn secondary">
        <i class="ri-google-fill"></i> Sign up with Google
      </button>
    </div>
  </nav>

  <main class="main">
    <section class="panel">
      <header class="panel-header">
        <h1>Analytics & Insights</h1>
        <p>Explore performance across devices, dates, and links.</p>
      </header>

      <div class="panel-body">
        <!-- Filters -->
        <div class="filters">
          <div>
            <label for="filter-device">Device type</label>
            <select id="filter-device">
              <option value="">All</option>
              <option value="mobile">Mobile</option>
              <option value="desktop">Desktop</option>
              <option value="tablet">Tablet</option>
            </select>
          </div>
          <div>
            <label for="filter-from">
              From
              <i class="ri-calendar-line"></i>
            </label>
            <input type="date" id="filter-from" />
          </div>
          <div>
            <label for="filter-to">
              To
              <i class="ri-calendar-line"></i>
            </label>
            <input type="date" id="filter-to" />
          </div>
          <button id="btn-apply-filters" class="btn primary">
            Apply filters
          </button>
        </div>

        <!-- 7) BUTTONS UNDER ANALYSIS -->
        <div class="analysis-actions">
          <button id="btn-refresh-stats" class="btn secondary">
            <i class="ri-refresh-line"></i> Refresh stats
          </button>
          <button id="btn-export-csv" class="btn secondary">
            <i class="ri-file-download-line"></i> Export CSV
          </button>
        </div>

        <!-- Table -->
        <table class="table" id="table-analysis">
          <thead>
            <tr>
              <th>Link</th>
              <th>Device</th>
              <th>Date</th>
              <th>Clicks</th>
            </tr>
          </thead>
          <tbody id="tbody-analysis">
            <!-- Filled by JS -->
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="./js/analysis.js"></script>
</body>
</html>
