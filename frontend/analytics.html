<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics - Smart Link Hub</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .analytics-container {
            max-height: 600px;
            overflow-y: auto;
            padding: 20px;
        }
        .chart {
            margin: 20px 0;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 8px;
            height: auto;
        }
    </style>
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <ul class="nav-container">
            <li class="nav-logo"><a href="dashboard.html">SmartLinkHub</a></li>
            <li class="nav-menu">
                <ul class="nav-items">
                    <li><a href="dashboard.html" class="nav-link">Dashboard</a></li>
                    <li><a href="analytics.html" class="nav-link active">Analytics</a></li>
                    <li><a href="links.html" class="nav-link">Links</a></li>
                    <li><a href="settings.html" class="nav-link">Settings</a></li>
                </ul>
            </li>
            <li><a href="login.html" class="nav-link" id="authNav">Logout</a></li>
        </ul>
    </nav>

    <!-- Main Content -->
    <main class="analytics-container">
        <section class="analytics-header">
            <h1>Analytics & Insights</h1>
            <p>Track your link performance</p>
        </section>

        <section class="analytics-charts">
            <div class="chart">
                <h3>Click Distribution</h3>
                <div id="clickChart" style="height: 300px; background: #fff; padding: 20px; border-radius: 4px;"></div>
            </div>

            <div class="chart">
                <h3>CTR Performance</h3>
                <div id="ctrChart" style="height: 300px; background: #fff; padding: 20px; border-radius: 4px;">
                    <p id="avgCTRMobile" style="font-size: 24px; font-weight: bold; text-align: center; margin: 100px 0;">0%</p>
                </div>
            </div>

            <div class="chart">
                <h3>Traffic Sources</h3>
                <div id="trafficChart" style="height: 300px; background: #fff; padding: 20px; border-radius: 4px;"></div>
            </div>

            <div class="chart">
                <h3>Performance Over Time</h3>
                <div id="performanceChart" style="height: 300px; background: #fff; padding: 20px; border-radius: 4px;"></div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
    <script>
        // Fix infinite scrolling by limiting chart recreation
        let chartsInitialized = false;

        function initializeAnalytics() {
            if (chartsInitialized) return;
            chartsInitialized = true;

            // Initialize charts with fixed heights and prevent infinite recreation
            const chartElements = document.querySelectorAll('.chart');
            chartElements.forEach(chart => {
                chart.style.minHeight = '350px';
                chart.style.overflow = 'hidden';
            });
        }

        // Initialize on page load
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initializeAnalytics);
        } else {
            initializeAnalytics();
        }
    </script>
</body>
</html>
