<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Smart Link Hub</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <ul class="nav-container">
            <li class="nav-logo"><a href="dashboard.html">SmartLinkHub</a></li>
            <li class="nav-menu">
                <ul class="nav-items">
                    <li><a href="dashboard.html" class="nav-link active">Dashboard</a></li>
                    <li><a href="analytics.html" class="nav-link">Analytics</a></li>
                    <li><a href="links.html" class="nav-link">Links</a></li>
                    <li><a href="settings.html" class="nav-link">Settings</a></li>
                </ul>
            </li>
            <li><a href="login.html" class="nav-link" id="authNav">Logout</a></li>
        </ul>
    </nav>

    <!-- Main Content -->
    <main class="dashboard-container">
        <section class="dashboard-header">
            <h1>Welcome to Dashboard</h1>
            <p>Manage and track your links efficiently</p>
        </section>

        <section class="dashboard-stats">
            <div class="stat-card">
                <h3>Total Links</h3>
                <p class="stat-number" id="totalLinks">0</p>
            </div>
            <div class="stat-card">
                <h3>Total Clicks</h3>
                <p class="stat-number" id="totalClicks">0</p>
            </div>
            <div class="stat-card">
                <h3>Avg CTR</h3>
                <p class="stat-number" id="avgCTR">0%</p>
            </div>
        </section>

        <section class="dashboard-links">
            <h2>Your Links</h2>
            <div id="linksList" class="links-list"></div>
        </section>
    </main>

    <script src="script.js"></script>
    <script>
        // Initialize dashboard
        function initializeDashboard() {
            const currentPage = window.location.pathname.split('/').pop() || 'dashboard.html';
            document.querySelectorAll('.nav-item').forEach(item => {
                const link = item.querySelector('.nav-link');
                if (link && link.getAttribute('href') === currentPage) {
                    link.classList.add('active');
                }
            });
        }
        initializeDashboard();
    </script>
</body>
</html>
