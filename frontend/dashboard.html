<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Link Hub – Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!-- Icons (calendar, stats, etc.) -->
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <!-- NAVBAR (shared across pages) -->
  <nav class="navbar">
    <div class="navbar-logo">LinkHub</div>
    <ul class="navbar-links">
      <li><a href="./dashboard.html" class="active">Dashboard</a></li>
      <li><a href="./analysis.html">Analysis</a></li>
      <li><a href="./public.html">Public Page</a></li>
    </ul>
    <div class="navbar-auth">
      <button id="btn-google-signup" class="btn secondary">
        <i class="ri-google-fill"></i> Sign up with Google
      </button>
    </div>
  </nav>

  <main class="main">
    <!-- STATS CARDS -->
    <section class="stats">
      <div class="stat-card">
        <i class="ri-link-m"></i>
        <div>
          <p>Total Links</p>
          <h2 id="stat-total-links">0</h2>
        </div>
      </div>
      <div class="stat-card">
        <i class="ri-bar-chart-2-line"></i>
        <div>
          <p>Today Clicks</p>
          <h2 id="stat-today-clicks">0</h2>
        </div>
      </div>
      <div class="stat-card">
        <i class="ri-smartphone-line"></i>
        <div>
          <p>Active Rules</p>
          <h2 id="stat-active-rules">0</h2>
        </div>
      </div>
    </section>

    <!-- ADD LINK + RULES -->
    <section class="panel">
      <header class="panel-header">
        <h1>Manage Links & Rules</h1>
        <p>Control your smart link hub with simple actions.</p>
      </header>

      <div class="panel-body">
        <!-- Add Link Form -->
        <form id="form-add-link" class="form-inline">
          <input type="url" id="input-link-url" placeholder="Paste link URL" required />
          <input type="text" id="input-link-title" placeholder="Title (optional)" />
          <button type="submit" class="btn primary">Add Link</button>
        </form>

        <!-- Rule Builder -->
        <div id="rulesList">
    <div class="empty-state">No rules yet</div>
</div>

<!-- ===== RULE CREATION FORM ===== -->
<div style="margin-top: 16px; padding: 12px; background: #0a0a0a; border-radius: 4px; border: 1px solid #222222;">
    <h4 style="color: #00ff41; margin-bottom: 12px;">➕ Add New Rule</h4>
    
    <!-- Rule Type Dropdown -->
    <div style="margin-bottom: 12px;">
        <label style="color: #00ff41; font-size: 12px; font-weight: 600; display: block; margin-bottom: 6px;">RULE TYPE:</label>
        <select id="ruleType" onchange="showRuleOptions()" style="
            width: 100%;
            padding: 10px;
            background: #000000;
            border: 1px solid #222222;
            color: #ffffff;
            border-radius: 4px;
            font-size: 13px;
            font-family: inherit;
        ">
            <option value="">-- Select Rule Type --</option>
            <option value="device">🖥️ Device Type</option>
            <option value="location">📍 Location Based</option>
            <option value="time">⏰ Time Based</option>
            <option value="custom">⚙️ Custom Rule</option>
        </select>
    </div>
    
    <!-- Device Type Dropdown (hidden by default) -->
    <div id="deviceTypeDiv" style="display: none; margin-bottom: 12px;">
        <label style="color: #00ff41; font-size: 12px; font-weight: 600; display: block; margin-bottom: 6px;">SELECT DEVICE:</label>
        <select id="deviceType" style="
            width: 100%;
            padding: 10px;
            background: #000000;
            border: 1px solid #222222;
            color: #ffffff;
            border-radius: 4px;
            font-size: 13px;
        ">
            <option value="">-- Select Device --</option>
            <option value="mobile">📱 Mobile</option>
            <option value="tablet">📲 Tablet</option>
            <option value="desktop">💻 Desktop</option>
            <option value="other">🔌 Other</option>
        </select>
    </div>
    
    <!-- Location Input (hidden by default) -->
    <div id="locationDiv" style="display: none; margin-bottom: 12px;">
        <label style="color: #00ff41; font-size: 12px; font-weight: 600; display: block; margin-bottom: 6px;">LOCATION:</label>
        <input type="text" id="locationInput" placeholder="Enter city or country" style="
            width: 100%;
            padding: 10px;
            background: #000000;
            border: 1px solid #222222;
            color: #ffffff;
            border-radius: 4px;
            font-size: 13px;
        ">
    </div>
    
    <!-- Time Input (hidden by default) -->
    <div id="timeDiv" style="display: none; margin-bottom: 12px;">
        <label style="color: #00ff41; font-size: 12px; font-weight: 600; display: block; margin-bottom: 6px;">TIME RANGE:</label>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
            <div>
                <label style="color: #00ff41; font-size: 11px; display: block; margin-bottom: 4px;">Start:</label>
                <input type="time" id="startTime" style="
                    width: 100%;
                    padding: 8px;
                    background: #000000;
                    border: 1px solid #222222;
                    color: #ffffff;
                    border-radius: 4px;
                    font-size: 13px;
                ">
            </div>
            <div>
                <label style="color: #00ff41; font-size: 11px; display: block; margin-bottom: 4px;">End:</label>
                <input type="time" id="endTime" style="
                    width: 100%;
                    padding: 8px;
                    background: #000000;
                    border: 1px solid #222222;
                    color: #ffffff;
                    border-radius: 4px;
                    font-size: 13px;
                ">
            </div>
        </div>
    </div>
    
    <!-- Add Rule Button -->
    <button class="btn btn-primary" onclick="addRule()" style="width: 100%; margin-top: 8px;">✅ Add Rule</button>
</div>

    <!-- LINKS TABLE -->
    <section class="panel">
      <header class="panel-header">
        <!-- 5) CHANGE EXTRA FEATURES HEADING -->
        <h2>Smart Link Actions</h2>
      </header>

      <div class="panel-body">
        <table class="table" id="table-links">
          <thead>
            <tr>
              <th>Title</th>
              <th>URL</th>
              <th>Device</th>
              <th>Active Range</th>
              <th>Clicks</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="tbody-links">
            <!-- Rows will be injected by JS -->
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="./js/dashboard.js"></script>
</body>
</html>
