openapi: 3.0.3
info:
  title: Smart Link Hub API
  description: |
    **Link Management System with Smart Rules Engine**
    
    Comprehensive REST API for managing smart link hubs with intelligent rule-based routing.
    
    Features:
    - **Smart Rule Engine**: AND/OR logic for conditional link display
    - **Analytics Tracking**: Real-time PostgreSQL-backed performance metrics
    - **Authentication**: JWT-based secure access
    - **PostgreSQL Integration**: Persistent data storage (Neon/Supabase compatible)
    
    Built for Advitiya x JPD Hub Hackathon 2026
  version: 1.0.0
  contact:
    name: API Support
    email: support@linkhub.dev
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: https://api.linkhub.dev/v1
    description: Production server
  - url: http://localhost:3000/api
    description: Development server

tags:
  - name: Authentication
    description: User registration and login endpoints
  - name: Hubs
    description: Hub management operations
  - name: Links
    description: Link CRUD with Smart Rules
  - name: Analytics
    description: Performance tracking and metrics

paths:
  /auth/register:
    post:
      tags:
        - Authentication
      summary: Register new user
      description: Create a new user account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
                - name
              properties:
                email:
                  type: string
                  format: email
                  example: user@example.com
                password:
                  type: string
                  format: password
                  minLength: 8
                  example: Password123!
                name:
                  type: string
                  example: John Doe
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                  user:
                    $ref: '#/components/schemas/User'
        '400':
          description: Invalid input
        '409':
          description: Email already exists

  /auth/login:
    post:
      tags:
        - Authentication
      summary: Login user
      description: Authenticate and receive JWT token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  user:
                    $ref: '#/components/schemas/User'
        '401':
          description: Invalid credentials

components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        email:
          type: string
          format: email
          example: user@example.com
        name:
          type: string
          example: John Doe
        created_at:
          type: string
          format: date-time

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - BearerAuth: []
