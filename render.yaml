services:
  - type: web
    name: smart-link-hub-backend
    runtime: node
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://ayushjhaa1187-spec.github.io

  - type: pserv
    name: smart-link-hub-db
    plan: free
    databaseName: linkhub
    databaseUser: linkhub_user
